# default.custom.yaml
patch:
  # ==========================================
  # 1. 基础体验优化
  # ==========================================
  "menu/page_size": 9                 # 候选词增加到 9 个，一目了然
  "switcher/hotkeys":
    - Control+F4                      # 方案选单仅保留 Control+F4

  # ==========================================
  # 2. 核心：中英切换与修饰键行为拦截
  # ==========================================
  "ascii_composer/switch_key/Shift_L": noop           # 彻底解放左 Shift，敲代码防误触
  "ascii_composer/switch_key/Shift_R": commit_code    # 右 Shift 切换中英

  # ==========================================
  # 3. 快捷键优化：使用 [,] 和 [.] 翻页
  # ==========================================
  # 使用 "+" 号追加在原有快捷键列表之后，不破坏原版的小键盘等映射
  "key_binder/bindings/+":
    - { when: has_menu, accept: comma, send: Page_Up }    # 逗号上一页
    - { when: has_menu, accept: period, send: Page_Down } # 句号下一页
