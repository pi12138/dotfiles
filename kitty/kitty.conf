# ==========================================
# 字体与排版 (专为长时间阅读代码优化)
# ==========================================
# 推荐提前在 Ubuntu 安装 JetBrains Mono 或 Fira Code 字体
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# 开启编程字体连字特性 (如 =>, != 等符号会变得更美观)
disable_ligatures never

# 行距稍微拉开一点，看起来不那么拥挤
modify_font baseline 1

# ==========================================
# 窗口与外观 (告别简陋，现代极简风)
# ==========================================
# 增加内边距，让文字不要紧贴边缘，视觉更呼吸
window_padding_width 0 5 5 5

# 隐藏 Ubuntu 原生窗口的粗大标题栏，让界面更沉浸 (依赖具体桌面环境支持)
hide_window_decorations yes

# 退出时如果没有正在运行的进程，不弹确认弹窗
confirm_os_window_close 0

# 背景透明度 (0.0 到 1.0，根据喜好调整，配合深色壁纸效果极佳)
background_opacity 0.95

# ==========================================
# 标签页 (开箱即用的多任务栏)
# ==========================================
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style round
# 标签页显示编号（例如：1: zsh  2: nvim），完美配合 Alt+数字 快捷键
tab_title_template "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

# --- 标签页切换：浏览器风格 ---

# 精确跳转到第 1-9 个标签页
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# ==========================================
# 性能与底层机制 (榨干硬件性能)
# ==========================================
# 降低输入延迟，配合高刷新率屏幕丝滑无比
repaint_delay 8
input_delay 2

# 垂直同步，避免画面撕裂
sync_to_monitor yes

# 历史回滚行数 (非常适合看长篇的报错日志或构建输出)
scrollback_lines 20000

# ==========================================
# 鼠标与交互
# ==========================================
# 鼠标隐藏时间 (打字时自动隐藏鼠标，秒数)
mouse_hide_wait 3.0

# 选中即复制 (Linux 经典习惯，选中文字自动进剪贴板)
copy_on_select yes

# ==========================================
# 配色主题 (Tokyo Night 极暗风格，护眼且高级)
# ==========================================
foreground #c0caf5
background #1a1b26
selection_foreground #c0caf5
selection_background #33467c
cursor #c0caf5
cursor_text_color #1a1b26

